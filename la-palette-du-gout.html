<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>La palette du goût</title>
</head>

<body>
    <main>
        <header class="logo">
            <a href="index.html"><img src="#" alt="fleche"></a>
            <h1>ohmyfood</h1>
        </header>

        <section class="restaurantPage">
            
            <div class="restaurantPage__img">
                <img src="img\la_palette_du_gout.jpg" alt="restaurant">
            </div>
            
            <div class="restaurantPage__menu">
                <header>
                    <h2>La palette du goût</h2>
                    <div class="restaurantCard__heart"><img src="#" alt="heart"></div>
                </header>

                <div class="starter">
                    <h3>entrées</h3>

                    <div class="plate">
                        <a class="plate__name">
                            <span>Fricassé d'escargot</span>
                            <p>Au piment d'espelette</p>
                        </a>
                        <span class="plate__price">25€</span>
                    </div>

                </div>

            <button>Commander</button>

        </section>

        <footer class="footerPage">
            <h1>ohmyfood</h1>
            <ul>
                <li><a href="#"><img src="" alt="logo">Proposer un restaurant</a></li>
                <li><a href="#"><img src="" alt="logo">Devenir partenaire</a></li>
                <li><a href="#">Mentions légales</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </footer>

    </main>

</html>
